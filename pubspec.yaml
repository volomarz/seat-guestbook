name: seat_guestbook
description: "SeatShots — sign seats at MLB, NFL, NHL, concerts, and NASCAR venues with a photo."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  share_plus: ^10.0.2
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  intl: ^0.19.0
  provider: ^6.1.2
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_auth: ^5.3.1
  http: ^1.2.2
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B4F2C"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"