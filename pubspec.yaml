name: seat_guestbook
description: A ballpark seat guestbook — sign seats at every MLB stadium with a photo.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  share_plus: ^10.0.2
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  intl: ^0.19.0
  provider: ^6.1.2
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_auth: ^5.3.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true